<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Socket.IO chat</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
      body {
        margin: 0;
        padding-bottom: 3rem;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Helvetica, Arial, sans-serif;
      }

      #form {
        background: rgba(0, 0, 0, 0.15);
        padding: 0.25rem;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        display: flex;
        height: 3rem;
        box-sizing: border-box;
        backdrop-filter: blur(10px);
      }
      #input {
        border: none;
        padding: 0 1rem;
        flex-grow: 1;
        border-radius: 2rem;
        margin: 0.25rem;
      }
      #input:focus {
        outline: none;
      }
      #form > button {
        background: #333;
        border: none;
        padding: 0 1rem;
        margin: 0.25rem;
        border-radius: 3px;
        outline: none;
        color: #fff;
      }

      #messages {
        list-style-type: none;
        margin: 0;
        padding: 0;
      }
      #messages > li {
        padding: 0.5rem 1rem;
      }
      #messages > li:nth-child(odd) {
        background: #efefef;
      }
    </style>
  </head>
  <body>
    <ul id="messages"></ul>
    <form id="form" action="">
      <input id="input" autocomplete="off" /><button>Send</button>
    </form>
  </body>
  <script>
    let userId = sessionStorage.getItem("userId");

    if (!userId) {
      userId = "user_" + crypto.randomUUID();
      sessionStorage.setItem("userId", userId);
    }

    const socket = io({
      auth: { userId },
    });

    console.log("My userId:", userId);
    const form = document.getElementById("form");
    const input = document.getElementById("input");
    const messages = document.getElementById("messages");

    // For private/public messages

    // socket.on("private message", (msg) => {
    //   const item = document.createElement("li");
    //   item.textContent = msg;
    //   messages.appendChild(item);
    //   window.scrollTo(0, document.body.scrollHeight);
    // });

    // For room messages

    // hardcoded sockets as members of the room
    const GROUP_MEMBERS = [
      "user_5a7e05b7-ab04-418e-af2d-e6716ae0f94c",
      "user_ff78b3fd-2f8d-4387-be2a-0f98083caaba",
      "user_2c39c702-7bbf-4d4b-b602-de2a823f90ba",
    ];
    const roomId = "room_tab1_tab2_tab3";
    // -x-x-x-x-x-x-
    socket.emit("join room", { roomId, members: GROUP_MEMBERS }); // To join a room
    // -x-x-x-x-x-x-
    socket.on("room message", ({ from, message }) => {
      const item = document.createElement("li");
      item.textContent = `${from}:${message}`;
      messages.appendChild(item);
      window.scrollTo(0, document.body.scrollHeight);
    });

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      if (input.value) {
        // For public messages
        // socket.emit("public message", input.value);

        // For private messages
        // socket.emit("private message", {
        //   to: "FVpQNy4LoTDxs-sRAAAJ",
        //   message: input.value,
        // });

        // For room messages
        socket.emit("room message", {
          roomId,
          message: input.value,
        });

        input.value = "";
      }
    });
  </script>
</html>
